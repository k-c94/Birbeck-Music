<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Birbeck Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
    <div class="logo">
        <img src="images/logo.png" alt="Music Therapy Logo">
    </div>
    <div class="burger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

    <!-- Contact Content -->
    <section class="contact">
    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>If you have any questions or would like to book a session, please reach out to us!</p>

        <form action="mailto:info@musictherapy.com" method="get" enctype="text/plain">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Your Message</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>
</section>

    <!-- Footer -->
     <!-- Footer -->
    <footer>
        <p>&copy; Birbeck Music | kc94 | All Rights Reserved</p>
    </footer>
</body>
</html>

<script>
    const burger = document.querySelector('.burger');
    const navLinks = document.querySelector('.nav-links');

    burger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
    });
</script>
